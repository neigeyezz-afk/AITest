<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가위바위보 AI 게임</title>
    <!-- Google Fonts 폰트 적용 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a; /* Slate 900 */
            --neon-blue: #06b6d4;
            --neon-purple: #8b5cf6;
            --neon-pink: #ec4899;
            --text-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #090d16 0%, #111827 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .game-card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* 덤벼라 버튼 디자인 */
        .btn-start {
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            color: #ffffff;
            border: none;
            padding: 16px 48px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 30px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.6);
        }

        .btn-start:active {
            transform: scale(0.98);
        }

        /* 웹캠 컨테이너 - 4배 크기 및 중앙 배치 */
        #webcam-container {
            width: 270px;
            height: 270px;
            max-width: 100%;
            max-height: 80vw; /* 모바일 반응형 처리 */
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.15);
            background: #020617;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            position: relative;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        /* 레이블 컨테이너 */
        #label-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .prediction-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 20px;
            border-radius: 12px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1rem;
        }

        .class-name {
            font-weight: 700;
            width: 80px;
            text-align: left;
        }

        .progress-track {
            flex-grow: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            margin: 0 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            width: 0%;
            border-radius: 4px;
            transition: width 0.2s ease;
        }

        .percentage {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            width: 50px;
            text-align: right;
            color: var(--neon-blue);
        }
    </style>
</head>
<body>

<div class="game-card">
    <h1>ROCK PAPER SCISSORS AI</h1>
    <div class="subtitle">Teachable Machine Image Model</div>
    
    <button class="btn-start" type="button" onclick="init()">덤벼라</button>
    
    <div id="webcam-container">
        <!-- 웹캠 플레이스홀더 (시작 전 시각적 요소) -->
        <div style="color: #475569; text-align: center; font-size: 0.9rem;" id="placeholder-text">
            [덤벼라] 버튼을 클릭해 카메라를 켜세요
        </div>
    </div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/RAiSWZEwl/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const placeholder = document.getElementById("placeholder-text");
        if (placeholder) placeholder.innerText = "카메라를 준비하고 모델을 가져오는 중...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // 캠 크기를 1/3 크기인 270x270으로 축소
        const flip = true; 
        webcam = new tmImage.Webcam(270, 270, flip); 
        await webcam.setup(); 
        await webcam.play();
        window.requestAnimationFrame(loop);

        const container = document.getElementById("webcam-container");
        container.innerHTML = ""; // 플레이스홀더 제거
        container.appendChild(webcam.canvas);
        
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = ""; // 기존 레이블 비우기
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probabilityVal = prediction[i].probability;
            const probability = (probabilityVal * 100).toFixed(0);
            
            let bar = labelContainer.childNodes[i];
            if (!bar) {
                bar = document.createElement("div");
                bar.className = "prediction-bar";
                bar.innerHTML = `
                    <span class="class-name">${className}</span>
                    <div class="progress-track">
                        <div class="progress-fill" style="width: 0%"></div>
                    </div>
                    <span class="percentage">0%</span>
                `;
                labelContainer.appendChild(bar);
            }
            
            bar.querySelector(".progress-fill").style.width = probability + "%";
            bar.querySelector(".percentage").innerText = probability + "%";
        }
    }
</script>

</body>
</html>
